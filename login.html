<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="todo-api-base" content="">
  <title>Login | Premium To-Do App</title>
  <link rel="stylesheet" href="style.css?v=20260317-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-page="login">
  <div id="auth-panel" class="auth-panel">
    <h2>Welcome Back</h2>
    <p id="auth-status" class="playlist-status"></p>
    <div class="auth-form">
      <input type="text" id="auth-name" placeholder="Name (for register)">
      <input type="email" id="auth-email" placeholder="Email">
      <input type="password" id="auth-password" placeholder="Password">
      <div class="auth-actions">
        <button type="button" id="auth-login-btn" class="playlist-btn">Login</button>
        <button type="button" id="auth-register-btn" class="bulk-btn">Register</button>
      </div>
    </div>
  </div>

  <div id="app-container" class="app-container app-hidden"></div>
  <script src="script.js?v=20260317-8"></script>
</body>
</html>
