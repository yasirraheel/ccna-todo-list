<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="todo-api-base" content="">
  <title>Premium To-Do App</title>
  <link rel="stylesheet" href="style.css?v=20260316-1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="app-container" class="app-container">
    <header>
      <div>
        <h1>My Tasks</h1>
        <p id="current-date" class="date-display"></p>
      </div>
      <div class="header-stats">
        <div><span id="task-count">0</span> tasks pending</div>
        <div class="session-row">
          <span id="session-email"></span>
          <button type="button" id="logout-btn" class="bulk-btn">Logout</button>
        </div>
      </div>
    </header>

    <section class="dashboard">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total</div>
          <div id="stat-total" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Completed</div>
          <div id="stat-completed" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending</div>
          <div id="stat-pending" class="stat-value">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Progress</div>
          <div class="progress-wrap">
            <div class="progress-bar"><div id="stat-progress-fill" class="progress-fill" style="width:0%"></div></div>
            <div id="stat-progress-label" class="progress-label">0%</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Playlist</div>
          <div id="stat-playlist" class="stat-value small">All</div>
        </div>
      </div>
      <div class="charts-grid">
        <div class="chart-card">
          <h3>Completion</h3>
          <canvas id="progressChart" height="96"></canvas>
        </div>
        <div class="chart-card">
          <h3>By Priority</h3>
          <canvas id="priorityChart" height="96"></canvas>
        </div>
      </div>
    </section>

    <form id="todo-form">
      <div class="main-input-wrapper">
        <input type="text" id="task-input" placeholder="What needs to be done?" required autocomplete="off">
        <button type="submit" class="add-btn"><i class="fas fa-plus"></i></button>
      </div>
      
      <div class="advanced-options">
        <div class="option-group">
          <i class="far fa-calendar-alt"></i>
          <input type="date" id="task-date">
        </div>
        <div class="option-group">
          <i class="fas fa-flag"></i>
          <select id="task-priority">
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium Priority</option>
            <option value="high">High Priority</option>
          </select>
        </div>
        <div class="option-group">
          <i class="fas fa-tag"></i>
          <select id="task-category">
            <option value="personal">Personal</option>
            <option value="work">Work</option>
            <option value="shopping">Shopping</option>
          </select>
        </div>
      </div>
    </form>

    <div class="playlist-import">
      <div class="playlist-input-wrapper">
        <div class="playlist-url-row">
          <input type="url" id="playlist-url" placeholder="Paste YouTube playlist URL" autocomplete="off">
        </div>
        <div class="playlist-attributes-row">
          <input type="text" id="playlist-name" placeholder="Playlist name (optional)">
          <select id="playlist-priority">
            <option value="">Select Priority</option>
            <option value="low">Low Priority</option>
            <option value="medium">Medium Priority</option>
            <option value="high">High Priority</option>
          </select>
          <select id="playlist-type">
            <option value="">Select Type</option>
            <option value="personal">Personal</option>
            <option value="work">Work</option>
            <option value="shopping">Shopping</option>
            <option value="learning">Learning</option>
          </select>
          <input type="date" id="playlist-date">
          <button type="button" id="import-playlist-btn" class="playlist-btn">Import Playlist</button>
        </div>
      </div>
      <p id="playlist-status" class="playlist-status"></p>
    </div>

    <div class="filters">
      <div class="playlist-toolbar">
        <select id="playlist-filter" title="Filter by playlist">
        <option value="all">All Playlists</option>
        </select>
        <button type="button" id="playlist-rename-btn" class="bulk-btn" title="Rename playlist"><i class="fas fa-pen"></i></button>
        <button type="button" id="playlist-delete-btn" class="bulk-btn danger" title="Delete playlist"><i class="fas fa-trash"></i></button>
      </div>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div class="bulk-actions">
      <label class="select-all-wrap">
        <input type="checkbox" id="select-all-tasks">
        <span>Select visible</span>
      </label>
      <button type="button" id="delete-selected-btn" class="bulk-btn">Delete Selected</button>
      <button type="button" id="delete-all-btn" class="bulk-btn danger">Delete All</button>
    </div>

    <ul id="task-list"></ul>
  </div>

  <button id="scroll-top-btn" class="scroll-top-btn" aria-label="Scroll to top" title="Scroll to top">
    <i class="fas fa-arrow-up"></i>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="" crossorigin="anonymous"></script>
  <script src="script.js?v=20260316-5"></script>

  <!-- Custom Confirmation Modal -->
  <div id="custom-modal" class="modal-overlay">
    <div class="modal-content">
      <div id="modal-title" class="modal-title">Confirm Action</div>
      <div id="modal-message" class="modal-message">Are you sure you want to proceed?</div>
      <div class="modal-actions">
        <button id="modal-cancel" class="modal-btn modal-btn-cancel">Cancel</button>
        <button id="modal-confirm" class="modal-btn modal-btn-danger">Delete</button>
      </div>
    </div>
  </div>
</body>
</html>
